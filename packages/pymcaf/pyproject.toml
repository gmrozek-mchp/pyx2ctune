[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "pymcaf"
version = "0.1.0"
description = "Python SDK for Microchip MCAF motor control firmware"
requires-python = ">=3.10,<3.13"
license = {text = "MIT"}
dependencies = [
    "pyx2cscope>=0.5.0",
]

[tool.setuptools.packages.find]
where = ["src"]
