name: Build Executables

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: mctoolbox-linux
          - os: macos-latest
            artifact: mctoolbox-macos
          - os: windows-latest
            artifact: mctoolbox-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Linux display dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libxkbcommon-x11-0 \
            libegl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build application
        run: pyinstaller mctoolbox.spec

      - name: Package (macOS DMG)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist/dmg
          cp -R dist/mctoolbox.app dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create -volname mctoolbox -srcfolder dist/dmg \
            -ov -format UDZO dist/${{ matrix.artifact }}.dmg

      - name: Package (Linux tar.gz)
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz mctoolbox/

      - name: Package (Linux .deb)
        if: runner.os == 'Linux'
        run: |
          PKG=dist/deb-staging
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          mkdir -p $PKG/opt/mctoolbox
          cp -R dist/mctoolbox/* $PKG/opt/mctoolbox/
          mkdir -p $PKG/usr/local/bin
          ln -s /opt/mctoolbox/mctoolbox $PKG/usr/local/bin/mctoolbox
          mkdir -p $PKG/usr/share/applications
          cat > $PKG/usr/share/applications/mctoolbox.desktop <<'DESKTOP'
          [Desktop Entry]
          Name=MCToolbox
          Comment=MCAF motor control tuning tool
          Exec=/opt/mctoolbox/mctoolbox
          Terminal=false
          Type=Application
          Categories=Development;Engineering;
          DESKTOP
          sed -i 's/^          //' $PKG/usr/share/applications/mctoolbox.desktop
          mkdir -p $PKG/DEBIAN
          cat > $PKG/DEBIAN/control <<EOF
          Package: mctoolbox
          Version: ${VERSION}
          Section: electronics
          Priority: optional
          Architecture: amd64
          Depends: libxcb-xinerama0, libxcb-cursor0, libxkbcommon-x11-0, libegl1
          Maintainer: Microchip Technology <support@microchip.com>
          Description: MCAF motor control tuning tool
           GUI application for PI gain tuning of Microchip MCAF
           motor control firmware using pyX2Cscope.
          EOF
          sed -i 's/^          //' $PKG/DEBIAN/control
          dpkg-deb --build $PKG dist/${{ matrix.artifact }}.deb

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path mctoolbox -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        if: runner.os != 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.zip
            dist/${{ matrix.artifact }}.dmg

      - name: Upload artifact (Linux tar.gz)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}-tar
          path: dist/${{ matrix.artifact }}.tar.gz

      - name: Upload artifact (Linux .deb)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}-deb
          path: dist/${{ matrix.artifact }}.deb

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
            artifacts/**/*.dmg
            artifacts/**/*.deb
