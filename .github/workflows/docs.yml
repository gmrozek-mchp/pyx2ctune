name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'packages/pymcaf/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/pymcaf/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/pymcaf[docs]"

      - name: Build documentation
        working-directory: packages/pymcaf/docs
        run: sphinx-build -b html . _build/html -W --keep-going

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: packages/pymcaf/docs/_build/html

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-html
          path: html

      - name: Deploy to gmrozek-mchp/pymcaf
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.PYMCAF_DOCS_DEPLOY_KEY }}
          external_repository: gmrozek-mchp/pymcaf
          publish_branch: gh-pages
          publish_dir: ./html
          force_orphan: true
